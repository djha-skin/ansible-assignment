---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: ansible-test
    image: "geerlingguy/ansible:latest"
    volumes:
      - /home/dhaskin/madeup.log:/var/log/ultradns-quiz-madeup.log:ro
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  playbooks:
    converge: ${MOLECULE_PLAYBOOK:-converge.yml}
    verify: ${MOLECULE_VERIFY:-verify.yml}
  inventory:
    group_vars:
      all:
        ansible_connection: docker
        ansible_user: root
    hosts:
      all:
        hosts:
          ansible-test: {}
  config_options:
    defaults:
      library: ../library
verifier:
  name: ansible
  config_options:
    defaults:
      library: ../library
